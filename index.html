<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Online Tutoring Scheduler — Live Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --topic-graphs: #06b6d4;
    --topic-dp: #8b5cf6;
    --topic-os: #10b981;
    --topic-networks: #f59e0b;
    --topic-algorithms: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .pattern-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer;
  }
  .speed-select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer;
  }

  /* CONTROLS */
  .controls {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .btn {
    font-family: var(--mono); font-size: 11px; padding: 7px 16px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    border-radius: 4px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .step-counter {
    font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto;
  }
  .progress-bar-wrap { flex: 1; max-width: 200px; height: 3px; background: var(--border); border-radius: 2px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* LAYOUT */
  .main { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: auto auto; gap: 1px; background: var(--border); height: calc(100vh - 100px); }
  .panel { background: var(--bg); overflow: hidden; }

  /* EVENT LOG */
  .log-panel { grid-row: 1 / 3; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .panel-title { font-family: var(--mono); font-size: 10px; color: var(--muted); padding: 10px 16px; border-bottom: 1px solid var(--border); letter-spacing: 0.08em; text-transform: uppercase; }
  .log-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
  .log-entry {
    padding: 8px 16px; font-size: 12px; border-left: 2px solid transparent;
    transition: background 0.2s; cursor: pointer;
    display: grid; grid-template-columns: 48px 1fr; gap: 8px; align-items: start;
  }
  .log-entry:hover { background: var(--surface); }
  .log-entry.current { background: var(--surface2); border-left-color: var(--accent); }
  .log-entry.assigned { border-left-color: var(--green); }
  .log-entry.unassigned { border-left-color: var(--red); }
  .log-entry.override { border-left-color: var(--orange); }
  .log-entry.t-release { border-left-color: var(--yellow); }
  .log-time { font-family: var(--mono); font-size: 10px; color: var(--muted); padding-top: 1px; }
  .log-body { line-height: 1.5; }
  .log-body .rid { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .log-body .action { font-size: 12px; }
  .tag {
    display: inline-block; font-family: var(--mono); font-size: 9px; padding: 1px 5px;
    border-radius: 2px; margin-left: 4px; font-weight: 700; letter-spacing: 0.04em;
  }
  .tag-assigned { background: rgba(16,185,129,0.15); color: var(--green); }
  .tag-unassigned { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-override { background: rgba(245,158,11,0.15); color: var(--orange); }
  .tag-gate { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .tag-release { background: rgba(251,191,36,0.1); color: var(--yellow); }

  /* HEAP PANEL */
  .heap-panel { border-bottom: 1px solid var(--border); overflow-y: auto; }
  .heap-items { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
  .heap-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--surface); border-radius: 4px; font-size: 11px;
    border: 1px solid var(--border); transition: all 0.3s;
    animation: slideIn 0.25s ease;
  }
  .heap-item.top { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,212,255,0.15); }
  .heap-item.processing { opacity: 0.4; transform: scale(0.97); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .heap-score { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); min-width: 28px; text-align: right; }
  .heap-info { flex: 1; }
  .heap-sid { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .heap-topic { font-size: 11px; font-weight: 500; }
  .urgency-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* SLOTS PANEL */
  .slots-panel { overflow-y: auto; }
  .slots-grid { padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
  .slot-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--surface); border-radius: 4px; font-size: 11px;
    border: 1px solid var(--border); transition: all 0.4s;
  }
  .slot-row.reserved { border-style: dashed; opacity: 0.55; }
  .slot-row.just-assigned { animation: flashGreen 0.6s ease; }
  .slot-row.just-released { animation: flashYellow 0.6s ease; }
  @keyframes flashGreen { 0%,100%{} 30%{background:rgba(16,185,129,0.25); border-color:var(--green);} }
  @keyframes flashYellow { 0%,100%{} 30%{background:rgba(251,191,36,0.15); border-color:var(--yellow);} }
  .slot-id { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 28px; }
  .slot-topic { font-size: 10px; font-weight: 600; min-width: 72px; }
  .slot-ta { font-size: 10px; color: var(--muted); flex: 1; }
  .slot-bar-wrap { width: 48px; height: 6px; background: var(--border); border-radius: 3px; }
  .slot-bar { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .slot-num { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 24px; text-align: right; }
  .slot-unavail { font-family: var(--mono); font-size: 9px; color: var(--red); }
  .reserved-badge { font-family: var(--mono); font-size: 8px; color: var(--yellow); border: 1px solid var(--yellow); padding: 0 3px; border-radius: 2px; }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 0; border-top: 1px solid var(--border);
    background: var(--surface); padding: 0;
    position: fixed; bottom: 0; left: 0; right: 0;
  }
  .stat { flex: 1; padding: 8px 16px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-val { font-family: var(--mono); font-size: 18px; font-weight: 700; line-height: 1.2; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.orange { color: var(--orange); }
  .stat-val.blue { color: var(--accent); }
  .stat-val.purple { color: #a78bfa; }

  /* TOPIC COLORS */
  .topic-Graphs { color: var(--topic-graphs); }
  .topic-DP { color: var(--topic-dp); }
  .topic-OS { color: var(--topic-os); }
  .topic-Networks { color: var(--topic-networks); }
  .topic-Algorithms { color: var(--topic-algorithms); }
  .bar-Graphs { background: var(--topic-graphs); }
  .bar-DP { background: var(--topic-dp); }
  .bar-OS { background: var(--topic-os); }
  .bar-Networks { background: var(--topic-networks); }
  .bar-Algorithms { background: var(--topic-algorithms); }
  .pip-5 { background: #ef4444; }
  .pip-4 { background: #f97316; }
  .pip-3 { background: #eab308; }
  .pip-2 { background: #22c55e; }
  .pip-1 { background: #64748b; }

  .day-banner {
    padding: 6px 16px; font-family: var(--mono); font-size: 10px;
    color: var(--yellow); background: rgba(251,191,36,0.05);
    border-bottom: 1px solid rgba(251,191,36,0.15);
    letter-spacing: 0.08em;
  }
  .release-banner {
    padding: 6px 16px; font-family: var(--mono); font-size: 10px;
    color: var(--yellow); background: rgba(251,191,36,0.1);
    border-top: 1px dashed rgba(251,191,36,0.4);
    border-bottom: 1px dashed rgba(251,191,36,0.4);
    letter-spacing: 0.04em; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>⬡ ONLINE TUTORING SCHEDULER — LIVE VISUALIZER</h1>
  <div class="header-right">
    <select class="pattern-select" id="patternSel" onchange="loadPattern()">
      <option value="uniform">Uniform Pattern</option>
      <option value="bursty">Bursty Pattern</option>
      <option value="late_heavy" selected>Late-heavy Pattern</option>
    </select>
    <select class="speed-select" id="speedSel">
      <option value="800">Speed: Slow</option>
      <option value="400" selected>Speed: Normal</option>
      <option value="150">Speed: Fast</option>
      <option value="40">Speed: Turbo</option>
    </select>
  </div>
</header>

<div class="controls">
  <button class="btn primary" id="btnPlay" onclick="togglePlay()">▶ PLAY</button>
  <button class="btn" onclick="stepForward()">STEP →</button>
  <button class="btn" onclick="stepBack()">← BACK</button>
  <button class="btn" onclick="reset()">↺ RESET</button>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="step-counter" id="stepCounter">Step 0 / 0</div>
</div>

<div class="main">

  <div class="panel log-panel">
    <div class="panel-title">▸ EVENT LOG</div>
    <div class="log-scroll" id="logScroll"></div>
  </div>

  <!-- Right top: Heap -->
  <div class="panel heap-panel">

    <div class="heap-items" id="heapItems"></div>
  </div>

  <!-- Right bottom: Slots -->
  <div class="panel slots-panel">
    <div class="panel-title">▸ SLOT STATUS  <span id="slotSummary" style="color:var(--muted);float:right;font-size:10px"></span></div>
    <div class="slots-grid" id="slotsGrid"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-label">Served</div><div class="stat-val green" id="statServed">0</div></div>
  <div class="stat"><div class="stat-label">Unassigned</div><div class="stat-val red" id="statUnassigned">0</div></div>
  <div class="stat"><div class="stat-label">In Heap</div><div class="stat-val blue" id="statHeap">0</div></div>
  <div class="stat"><div class="stat-label">Overrides</div><div class="stat-val orange" id="statOverride">0</div></div>
  <div class="stat"><div class="stat-label">Gate Fires</div><div class="stat-val purple" id="statGate">0</div></div>
  <div class="stat"><div class="stat-label">CR (live)</div><div class="stat-val blue" id="statCR">—</div></div>
</div>

function computeScore(req) {
  return req.urgency + (req.weeks_waited * W);
}

function simulate(requests) {
  const slots = SLOT_DEFS.map(d => ({...d, occupancy:0, capacity:CAPACITY}));
  const openSlots = () => slots.filter(s => !s.reserved);

  const unassigned = [];

      const sa = computeScore(a), sb = computeScore(b);
      if (sa !== sb) return sb - sa;
      if (a.arrival_day !== b.arrival_day) return a.arrival_day - b.arrival_day;
      return a.arrival_hour - b.arrival_hour;
    });
  }

  function snapshotSlots() {
    return slots.map(s => ({...s}));
  }
  function snapshotHeap() {
    return heap.map(h => ({...h, score: computeScore(h)}));

      }

      // emergency override
      if (!assignedFlag && req.urgency === 5 && reservedSlots().length > 0 && overrideCount < 0.5 * originalReservedCount) {
        const rs = reservedSlots().find(s => s.avail);
        if (rs) {
          rs.reserved = false;
          rs.occupancy++;
          assigned[req.request_id] = rs.id;
          assignmentsThisWeek[req.student_id] = (assignmentsThisWeek[req.student_id]||0)+1;
          overrideCount++;
          overrideFires++;
          assignedFlag = true;
          allSteps.push({
            type: 'override',
            req: {...req, score: computeScore(req)},
            slotId: rs.id,
            heap: snapshotHeap(),
            slots: snapshotSlots(),
            assigned: {...assigned},
            unassigned: [...unassigned],
            served: Object.keys(assigned).length,
            gateTotal: gateFires,
            overrideTotal: overrideFires,
            msg: `⚡ EMERGENCY OVERRIDE — ${req.request_id} (urgency-5) pulled reserved slot ${rs.id} [${rs.topic}/${rs.ta}]`,
          });
        }
      }

      if (!assignedFlag) {
        const topicSlots = openSlots().filter(s => s.topic === req.topic);
        let reason;
        if (!topicSlots.length) reason = 'Topic not offered';
        else if (!topicSlots.some(s=>s.avail)) reason = 'TA unavailable';
        else reason = 'Capacity full';
        unassigned.push({request_id: req.request_id, student_id: req.student_id, reason});
        allSteps.push({
          type: 'unassigned',
          req: {...req, score: computeScore(req)},
          reason,
          heap: snapshotHeap(),
          slots: snapshotSlots(),
          assigned: {...assigned},
          unassigned: [...unassigned],
          served: Object.keys(assigned).length,
          gateTotal: gateFires,
          overrideTotal: overrideFires,
          msg: `✗ ${req.request_id} (${req.student_id}) unassigned — ${reason}`,
        });
      }
    }
  }

  for (const req of requests) {
    req.score = computeScore(req);

    // Day banner
    if (req.arrival_day !== lastDay) {
      lastDay = req.arrival_day;
      allSteps.push({type:'day', day: req.arrival_day, heap: snapshotHeap(), slots: snapshotSlots(),
        assigned:{...assigned}, unassigned:[...unassigned], served: Object.keys(assigned).length,
        gateTotal: gateFires, overrideTotal: overrideFires,
        msg: `── Day ${req.arrival_day} (${DAYS[req.arrival_day]}) ──`});
    }

    // Arrival
    heapInsert({...req});
    if ((assignmentsThisWeek[req.student_id]||0) === 0) waitingCount++;

    // T_release
    if (req.arrival_day >= T_RELEASE && !reservedReleased) {
      reservedReleased = true;
      slots.forEach(s => { if(s.reserved) s.reserved = false; });
      allSteps.push({type:'release', heap: snapshotHeap(), slots: snapshotSlots(),
        assigned:{...assigned}, unassigned:[...unassigned], served: Object.keys(assigned).length,
        gateTotal: gateFires, overrideTotal: overrideFires,
        msg: `🔓 T_release fired — S09 (Networks/TA_Ibrahim) + S10 (Algorithms/TA_Jasmine) released to OpenSlots`});
    }

    allSteps.push({
      type: 'arrival',
      req: {...req},
      heap: snapshotHeap(),
      slots: snapshotSlots(),
      assigned: {...assigned},
      unassigned: [...unassigned],
      served: Object.keys(assigned).length,
      gateTotal: gateFires,
      overrideTotal: overrideFires,
      msg: `↓ Arrival: ${req.request_id} — ${req.student_id} | ${req.topic} | urgency=${req.urgency} | score=${req.score.toFixed(1)} | Day${req.arrival_day} ${req.arrival_hour}:00`,
    });

    processHeap();
  }

  return allSteps;
}

// ── RENDER ────────────────────────────────────────────────────────
function renderLog(steps, currentIdx) {
  const el = document.getElementById('logScroll');
  el.innerHTML = '';
  steps.forEach((step, i) => {
    if (step.type === 'day') {
      const banner = document.createElement('div');
      banner.className = 'day-banner';
      banner.textContent = step.msg;
      el.appendChild(banner);
      return;
    }
    if (step.type === 'release') {
      const banner = document.createElement('div');
      banner.className = 'release-banner';
      banner.textContent = step.msg;
      el.appendChild(banner);
      return;
    }
    const div = document.createElement('div');
    div.className = `log-entry ${step.type} ${i === currentIdx ? 'current' : ''}`;
    div.onclick = () => { stepIdx = i; renderStep(stepIdx); };

    const timeStr = step.req ? `D${step.req.arrival_day} ${step.req.arrival_hour}:00` : '';
    let tag = '';
    if (step.type === 'assigned') tag = `<span class="tag tag-assigned">ASSIGNED → ${step.slotId}</span>`;
    if (step.type === 'unassigned') tag = `<span class="tag tag-unassigned">${step.reason.toUpperCase()}</span>`;
    if (step.type === 'override') tag = `<span class="tag tag-override">OVERRIDE</span>`;
    if (step.type === 'gate') tag = `<span class="tag tag-gate">GATE FIRED</span>`;

    div.innerHTML = `
      <div class="log-time">${timeStr}</div>
      <div class="log-body">
        <span class="action">${step.msg}</span>${tag}
      </div>`;
    el.appendChild(div);
  });

  // scroll current into view
  const curr = el.querySelector('.current');
  if (curr) curr.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function renderHeap(heapItems) {
  const el = document.getElementById('heapItems');
  el.innerHTML = '';
  document.getElementById('heapCount').textContent = `${heapItems.length} item${heapItems.length!==1?'s':''}`;
  heapItems.slice(0,12).forEach((req, i) => {
    const div = document.createElement('div');
    div.className = `heap-item ${i===0?'top':''}`;
    div.innerHTML = `
      <div class="heap-score">${req.score.toFixed(1)}</div>
      <div class="urgency-pip pip-${req.urgency}"></div>
      <div class="heap-info">
        <div class="heap-topic topic-${req.topic}">${req.topic}</div>
        <div class="heap-sid">${req.student_id} · U${req.urgency} · ${req.request_id}</div>
      </div>`;
    el.appendChild(div);
  });
  if (heapItems.length > 12) {
    const more = document.createElement('div');
    more.style = 'text-align:center;color:var(--muted);font-size:10px;padding:4px;font-family:var(--mono)';
    more.textContent = `+ ${heapItems.length - 12} more`;
    el.appendChild(more);
  }
}

function renderSlots(slotSnap, lastAssigned, justReleased) {
  const el = document.getElementById('slotsGrid');
  el.innerHTML = '';
  let openCap = 0, usedCap = 0;
  slotSnap.forEach(slot => {
    const div = document.createElement('div');
    const isReserved = slot.reserved;
    const justA = slot.id === lastAssigned;
    const justR = justReleased && justReleased.includes(slot.id);
    div.className = `slot-row ${isReserved?'reserved':''} ${justA?'just-assigned':''} ${justR?'just-released':''}`;

    const fillPct = (slot.occupancy / slot.capacity) * 100;
    const barColor = isReserved ? '#f59e0b' : `var(--topic-${slot.topic.replace(' ','')})`;
    const topicClass = `topic-${slot.topic}`;

    if (!isReserved) { openCap += slot.capacity; usedCap += slot.occupancy; }

    div.innerHTML = `
      <span class="slot-id">${slot.id}</span>
      <span class="slot-topic ${topicClass}">${slot.topic}</span>
      <span class="slot-ta">${slot.ta}</span>
      ${!slot.avail ? '<span class="slot-unavail">UNAVAIL</span>' : ''}
      ${isReserved ? '<span class="reserved-badge">RSVD</span>' : ''}
      <div class="slot-bar-wrap"><div class="slot-bar" style="width:${fillPct}%;background:${barColor}"></div></div>
      <span class="slot-num">${slot.occupancy}/${slot.capacity}</span>`;
    el.appendChild(div);
  });
  document.getElementById('slotSummary').textContent = `${usedCap}/${openCap} seats used`;
}

function renderStep(idx) {
  if (!steps.length) return;
  idx = Math.max(0, Math.min(steps.length-1, idx));
  stepIdx = idx;

  const step = steps[idx];

  // log (rerender with current highlighted)
  renderLog(steps, idx);

  // heap
  renderHeap(step.heap || []);

  // slots
  const lastAssigned = step.slotId || null;
  const justReleased = step.type === 'release' ? ['S09','S10'] : null;
  renderSlots(step.slots, lastAssigned, justReleased);

  // stats
  document.getElementById('statServed').textContent = step.served || 0;
  document.getElementById('statUnassigned').textContent = step.unassigned ? step.unassigned.length : 0;
  document.getElementById('statHeap').textContent = step.heap ? step.heap.length : 0;
  document.getElementById('statOverride').textContent = step.overrideTotal || 0;
  document.getElementById('statGate').textContent = step.gateTotal || 0;
  const offline = OFFLINE_SERVED[currentPattern] || 31;
  const cr = step.served > 0 ? (step.served / offline).toFixed(4) : '—';
  document.getElementById('statCR').textContent = cr;

  // progress
  const pct = steps.length > 1 ? (idx / (steps.length-1)) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = `Step ${idx+1} / ${steps.length}`;
}

// ── CONTROLS ──────────────────────────────────────────────────────
function togglePlay() {
  if (playTimer) {
    clearInterval(playTimer);
    playTimer = null;
    document.getElementById('btnPlay').textContent = '▶ PLAY';
    document.getElementById('btnPlay').classList.remove('active');
  } else {
    document.getElementById('btnPlay').textContent = '⏸ PAUSE';
    document.getElementById('btnPlay').classList.add('active');
    const speed = parseInt(document.getElementById('speedSel').value);
    playTimer = setInterval(() => {
      if (stepIdx >= steps.length - 1) {
        clearInterval(playTimer); playTimer = null;
        document.getElementById('btnPlay').textContent = '▶ PLAY';
        document.getElementById('btnPlay').classList.remove('active');
        return;
      }
      stepForward();
    }, speed);
  }
}

function stepForward() {
  if (stepIdx < steps.length - 1) { stepIdx++; renderStep(stepIdx); }
}
function stepBack() {
  if (stepIdx > 0) { stepIdx--; renderStep(stepIdx); }
}
function reset() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  document.getElementById('btnPlay').classList.remove('active');
  stepIdx = 0;
  renderStep(0);
}
function loadPattern() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  document.getElementById('btnPlay').textContent = '▶ PLAY';
  document.getElementById('btnPlay').classList.remove('active');
  currentPattern = document.getElementById('patternSel').value;
  steps = simulate(DATASETS[currentPattern].map(r=>({...r})));
  stepIdx = 0;
  renderStep(0);
}

// ── INIT ──────────────────────────────────────────────────────────
loadPattern();
</script>
